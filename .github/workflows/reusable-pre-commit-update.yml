---
on:
  workflow_call:

permissions: {}

jobs:
  pre-commit-update:
    name: pre-commit Update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        if: github.event.repository.private == false
        id: harden_runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set Up UV
        id: setup_uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Update pre-commit
        id: update_pre_commit
        run: |
          uvx pre-commit autoupdate --freeze

      - name: Check for changes
        id: check_changes
        run: |
          if ! git diff --exit-code .pre-commit-config.yaml; then
            echo "Changes detected in pre-commit configuration"
            echo "changed=true" >>"${GITHUB_ENV}"
          else
            echo "No changes detected"
            echo "changed=false" >>"${GITHUB_ENV}"
          fi

      - name: Create branch
        id: create_branch
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branchName="pre-commit-update-$(date +%Y%m%d%H%M%S)"
          export branchName
          echo "branchName=${branchName}" >>"${GITHUB_ENV}"

          gh api \
            --method POST "/repos/${{ github.repository }}/git/refs" \
            --raw-field ref="refs/heads/${branchName}" \
            --raw-field sha="$(git rev-parse HEAD)"

      - name: Commit changes
        if: env.changed == 'true'
        id: commit_changes
        run: |
          branch="${branchName}"
          path=".pre-commit-config.yaml"
          contents="$(base64 -w 0 "${path}")"

          existing_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${branch}" \
              --jq '.sha' 2>/dev/null || echo ""
          )"

          if [ -n "${existing_sha}" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🤖 Update .pre-commit-config.yaml" \
              -f content="${contents}" \
              -f branch="${branch}" \
              -f sha="${existing_sha}"
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="🤖 Update .pre-commit-config.yaml" \
              -f content="${contents}" \
              -f branch="${branch}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find previous pull request
        id: find_previous_pr
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          previousPullRequest=$(gh pr list --app "github-actions" --state open --search "🤖 pre-commit version update" --json "number" | jq -r '.[].number')
          export previousPullRequest

          if [[ -z "${previousPullRequest}" ]]; then
            echo "No previous pull request found"
          else
            echo "Found previous pull request: ${previousPullRequest}"
            echo "previousPullRequest=${previousPullRequest}" >>"${GITHUB_ENV}"
          fi

      - name: Create pull request
        if: env.changed == 'true'
        id: create_pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ env.branchName }}
        run: |
          pullRequestUrl=$(gh pr create \
            --title "🤖 pre-commit version update" \
            --body "This pull request updates the pre-commit configuration to the latest available versions.\n\n> [!NOTE]\nGitHub Actions workflows cannot be triggered by bots, so you may need to close and reopen the pull request to trigger them" \
            --head "${BRANCH_NAME}" \
            --base "main")
          export pullRequestUrl
          echo "pullRequestUrl=${pullRequestUrl}" >>"${GITHUB_ENV}"

      - name: Close previous pull request
        if: env.changed == 'true' && env.previousPullRequest != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOUS_PULL_REQUEST: ${{ env.previousPullRequest }}
          NEW_PULL_REQUEST: ${{ env.pullRequestUrl }}
        run: |
          gh pr close "${PREVIOUS_PULL_REQUEST}" --comment "Superseded by ${NEW_PULL_REQUEST}" --delete-branch
