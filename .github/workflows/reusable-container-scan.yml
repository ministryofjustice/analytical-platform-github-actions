---
on:
  workflow_call:
    inputs:
      runtime:
        type: string
        required: true

permissions: {}

jobs:
  grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clean Actions Runner
        id: clean_actions_runner
        uses: ministryofjustice/action-clean-runner@390530713a326ddc099b2114f38dd0f2f8eac6da # v1.1.0
        with:
          confirm: true

      - name: Generate .grype.yml Configuration
        id: generate_grype_config
        shell: bash
        env:
          RUNTIME: ${{ inputs.runtime }}
        run: |
          BASE_GRYPE="analytical-platform-airflow-${RUNTIME}-base-grype.yml"

          if ! curl --silent --show-error --fail --location \
            "https://raw.githubusercontent.com/ministryofjustice/analytical-platform-airflow-${RUNTIME}-base/main/.grype.yml" \
            --output "${BASE_GRYPE}"; then
            echo "No base .grype.yml found"
            rm -f "${BASE_GRYPE}"
          fi

          if [[ -f "${BASE_GRYPE}" ]] && [[ -f .grype.yml ]]; then
            echo "Merging base and local .grype.yml configurations"
            # shellcheck disable=SC2016
            yq eval-all 'explode(.) as $item ireduce ({}; . *+ $item)' "${BASE_GRYPE}" .grype.yml > merged-grype.yml
            mv merged-grype.yml .grype.yml
          elif [[ -f "${BASE_GRYPE}" ]]; then
            mv "${BASE_GRYPE}" .grype.yml
            echo "Using .grype.yml from base repository"
          elif [[ -f .grype.yml ]]; then
            echo "Using local .grype.yml configuration"
          else
            echo "No .grype.yml found, Grype will use default configuration"
          fi

      - name: Build Container Image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.sha }}

      - name: Scan
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ github.sha }}
          severity-cutoff: high
          only-fixed: true
          fail-build: false
          output-format: sarif
          output-file: result.sarif

      - name: Upload SARIF
        id: upload_sarif
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: result.sarif

      - name: Process Scan Result
        id: process_scan_result
        shell: bash
        run: |
          print_findings() {
            local title=$1
            local findings=$2

            if [[ -n "${findings}" ]]; then
              echo "### ${title}"
              echo ""
              echo "${findings}"
              echo ""
            fi
          }

          SARIF=$(cat result.sarif)

          # Build a lookup map of ruleId -> security-severity score from the rules section
          RULE_SEVERITIES=$(echo "${SARIF}" | jq -c '
            .runs[0].tool.driver.rules
            | map({key: .id, value: (.properties["security-severity"] // "0" | tonumber)})
            | from_entries
          ')

          CRITICAL_COUNT=$(echo "${SARIF}" | jq --argjson s "${RULE_SEVERITIES}" '
            [.runs[0].results[] | select($s[.ruleId] >= 9.0)] | length
          ')
          HIGH_COUNT=$(echo "${SARIF}" | jq --argjson s "${RULE_SEVERITIES}" '
            [.runs[0].results[] | select($s[.ruleId] >= 7.0 and $s[.ruleId] < 9.0)] | length
          ')
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT))

          SCAN_OUTPUT=$({
            echo "# Container Scan Summary"
            echo ""

            if [[ ${TOTAL} -eq 0 ]]; then
              echo "✅ No fixable high or critical vulnerabilities found."
            else
              echo "${CRITICAL_COUNT} critical, ${HIGH_COUNT} high."
              echo ""
              echo "## Detailed Findings"
              echo ""

              get_findings() {
                local min_score=$1
                local max_score=$2
                echo "${SARIF}" | jq -r --argjson s "${RULE_SEVERITIES}" \
                  --argjson min "${min_score}" --argjson max "${max_score}" '
                  def advisory_line:
                    (try (.ruleId | capture("^(?<id>CVE-[0-9]+-[0-9]+|GHSA-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+)") | .id) // .ruleId) as $id
                    | (if ($id | startswith("CVE-")) then "https://nvd.nist.gov/vuln/detail/\($id)"
                      elif ($id | startswith("GHSA-")) then "https://github.com/advisories/\($id)"
                      else "" end) as $url
                    | if $url != "" then "- [\($id)](\($url)) - \(.message.text)"
                      else "- \(.ruleId) - \(.message.text)"
                      end;
                  .runs[0].results[]
                  | select($s[.ruleId] >= $min and $s[.ruleId] < $max)
                  | advisory_line
                '
              }

              CRITICAL_FINDINGS=$(get_findings 9.0 10.1)
              HIGH_FINDINGS=$(get_findings 7.0 9.0)

              print_findings "Critical" "${CRITICAL_FINDINGS}"
              print_findings "High" "${HIGH_FINDINGS}"

              echo "## Source"
              echo ""
              echo "<table>"
              echo "<tr><td><strong>Actor</strong></td><td>@${GITHUB_ACTOR}</td></tr>"
              echo "<tr><td><strong>Commit</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}\"><code>${GITHUB_SHA}</code></a></td></tr>"
              echo "<tr><td><strong>Workflow</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">View run</a></td></tr>"
              echo "</table>"
            fi
          })

          echo "${SCAN_OUTPUT}"
          {
            echo "scan-summary<<EOF"
            echo "${SCAN_OUTPUT}"
            echo "EOF"
            echo "critical-count=${CRITICAL_COUNT}"
            echo "high-count=${HIGH_COUNT}"
          } >>"${GITHUB_OUTPUT}"

      - name: Comment on Pull Request
        id: comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SCAN_SUMMARY: ${{ steps.process_scan_result.outputs.scan-summary }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Container Scan Summary')
            })

            const output = `${process.env.SCAN_SUMMARY}`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Fail Build on Findings
        if: |
          steps.process_scan_result.outputs.critical-count > 0 ||
          steps.process_scan_result.outputs.high-count > 0
        id: fail_build
        shell: bash
        env:
          CRITICAL_COUNT: ${{ steps.process_scan_result.outputs.critical-count }}
          HIGH_COUNT: ${{ steps.process_scan_result.outputs.high-count }}
        run: |
          echo "Build failed - found ${CRITICAL_COUNT} critical and ${HIGH_COUNT} high severity fixable vulnerabilities"
          exit 1
