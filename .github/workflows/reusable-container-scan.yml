---
on:
  workflow_call:
    inputs:
      clean-actions-runner:
        type: boolean
        required: false
        default: true
      container-file:
        type: string
        required: false
        default: Dockerfile

permissions: {}

jobs:
  grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Harden Runner
        if: github.event.repository.private == false
        id: harden_runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clean Actions Runner
        if: inputs.clean-actions-runner == true
        id: clean_actions_runner
        uses: ministryofjustice/action-clean-runner@390530713a326ddc099b2114f38dd0f2f8eac6da # v1.1.0
        with:
          confirm: true

      - name: Generate .grype.yml Configuration
        id: generate_grype_config
        env:
          CONTAINER_FILE: ${{ inputs.container-file }}
        shell: bash
        run: |
          imageName=$(grep "^FROM" "${CONTAINER_FILE}" | cut -d' ' -f2 | cut -d':' -f1)

          if [[ "${imageName}" == "ghcr.io/ministryofjustice/analytical-platform-"* ]]; then
            imageRepository=${imageName#ghcr.io/}

            downloadGrypeYml=$(gh api "repos/${imageRepository}/contents/.grype.yml" 2>/dev/null || true)
            export downloadGrypeYml

            downloadGrypeYmlStatus=$(jq -r '.status' <<< "${downloadGrypeYml}")
            export downloadGrypeYmlStatus

            if [[ "${downloadGrypeYmlStatus}" == "null" ]]; then
              echo "Using .grype.yml from ${imageRepository} (default branch)"
              jq -r '.sha' <<< "${downloadGrypeYml}" || true

              echo ".grype.yml found, writing to file"
              jq -r '.content' <<< "${downloadGrypeYml}" | base64 --decode > .base-grype.yml

              if [[ ! -f .grype.yml ]]; then
                echo ".grype.yml not found, using base as-is"
                mv .base-grype.yml .grype.yml
              else
                echo ".grype.yml already exists, merging with base"
                # shellcheck disable=SC2016
                yq eval-all 'explode(.) as $item ireduce ({}; . *+ $item)' .base-grype.yml .grype.yml > merged-grype.yml
                mv merged-grype.yml .grype.yml
              fi

            elif [[ "${downloadGrypeYmlStatus}" == "404" ]]; then
              echo ".grype.yml not found in ${imageRepository}, using default values" # It's OK if we don't find one
            else
              echo "Error downloading .grype.yml"
              exit 1
            fi
          else
            echo "Image is not an Analytical Platform image, skipping .grype.yml download"
          fi

      - name: Build Container Image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.sha }}

      - name: Scan
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ github.sha }}
          severity-cutoff: high
          only-fixed: true
          fail-build: false
          output-format: sarif
          output-file: result.sarif

      - name: Upload SARIF
        id: upload_sarif
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: result.sarif

      - name: Process Scan Result
        id: process_scan_result
        shell: bash
        run: |
          print_findings() {
            local title=$1
            local findings=$2

            if [[ -n "${findings}" ]]; then
              echo "### ${title}"
              echo ""
              echo "${findings}"
              echo ""
            fi
          }

          SARIF=$(cat result.sarif)

          CRITICAL_COUNT=$(echo "${SARIF}" | jq '
            def sev: ((.message.text | capture("^A (?<w>[A-Za-z]+) vulnerability") | .w | ascii_downcase) // "unknown");
            [.runs[0].results[] | select(sev == "critical")] | length
          ')
          HIGH_COUNT=$(echo "${SARIF}" | jq '
            def sev: ((.message.text | capture("^A (?<w>[A-Za-z]+) vulnerability") | .w | ascii_downcase) // "unknown");
            [.runs[0].results[] | select(sev == "high")] | length
          ')
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT))

          SCAN_OUTPUT=$({
            echo "# Container Scan Summary"
            echo ""

            if [[ ${TOTAL} -eq 0 ]]; then
              echo "✅ No fixable high or critical vulnerabilities found."
            else
              echo "${CRITICAL_COUNT} critical, ${HIGH_COUNT} high."
              echo ""
              echo "## Detailed Findings"
              echo ""

              # get_findings severity — filters SARIF results by qualitative severity and formats each as a markdown bullet.
              get_findings() {
                local severity=$1
                echo "${SARIF}" | jq -r --arg severity "${severity}" '
                  def sev: ((.message.text | capture("^A (?<w>[A-Za-z]+) vulnerability") | .w | ascii_downcase) // "unknown");

                  # 1. Build $fix_versions map: scans each rule'\''s help.text for a "Fix Version:" line and maps ruleId → first fix version

                  (.runs[0].tool.driver.rules
                    | map({
                        key: .id,
                        value: (
                          .help.text
                          | split("\n")
                          | map(select(startswith("Fix Version: ")))
                          | if length > 0 then .[0] | ltrimstr("Fix Version: ") | split(",") | first else "" end
                        )
                      })
                    | from_entries) as $fix_versions

                  # 2. advisory_line: formats one result — extracts a CVE/GHSA ID from the ruleId, links it to NVD or
                  #    GitHub Advisories, and appends "(fixed in x.y.z)" if a fix version is known

                  | def advisory_line:
                      (try (.ruleId | capture("^(?<id>CVE-[0-9]+-[0-9]+|GHSA-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+)") | .id) // .ruleId) as $id
                      | (if ($id | startswith("CVE-")) then "https://nvd.nist.gov/vuln/detail/\($id)"
                        elif ($id | startswith("GHSA-")) then "https://github.com/advisories/\($id)"
                        else "" end) as $url
                      | (($fix_versions[.ruleId] // "") | if . != "" then " (fixed in \(.))" else "" end) as $fix
                      | if $url != "" then "- [\($id)](\($url)) - \(.message.text)\($fix)"
                        else "- \(.ruleId) - \(.message.text)\($fix)"
                        end;

                  # 3. Filter + emit: stream results[], keep entries matching the qualitative severity, apply advisory_line to each

                  .runs[0].results[]
                  | select(sev == $severity)
                  | advisory_line
                '
              }

              CRITICAL_FINDINGS=$(get_findings "critical")
              HIGH_FINDINGS=$(get_findings "high")

              print_findings "Critical" "${CRITICAL_FINDINGS}"
              print_findings "High" "${HIGH_FINDINGS}"

              echo "## Source"
              echo ""
              echo "<table>"
              echo "<tr><td><strong>Actor</strong></td><td>@${GITHUB_ACTOR}</td></tr>"
              echo "<tr><td><strong>Commit</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}\"><code>${GITHUB_SHA}</code></a></td></tr>"
              echo "<tr><td><strong>Workflow</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">View run</a></td></tr>"
              echo "</table>"
            fi
          })

          echo "${SCAN_OUTPUT}"
          echo "${SCAN_OUTPUT}" >>"${GITHUB_STEP_SUMMARY}"
          {
            echo "scan-summary<<EOF"
            echo "${SCAN_OUTPUT}"
            echo "EOF"
            echo "critical-count=${CRITICAL_COUNT}"
            echo "high-count=${HIGH_COUNT}"
          } >>"${GITHUB_OUTPUT}"

      - name: Comment on Pull Request
        id: comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SCAN_SUMMARY: ${{ steps.process_scan_result.outputs.scan-summary }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Container Scan Summary')
            })

            const output = `${process.env.SCAN_SUMMARY}`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Fail Build on Findings
        if: |
          steps.process_scan_result.outputs.critical-count > 0 ||
          steps.process_scan_result.outputs.high-count > 0
        id: fail_build
        shell: bash
        env:
          CRITICAL_COUNT: ${{ steps.process_scan_result.outputs.critical-count }}
          HIGH_COUNT: ${{ steps.process_scan_result.outputs.high-count }}
        run: |
          echo "Build failed - found ${CRITICAL_COUNT} critical and ${HIGH_COUNT} high severity fixable vulnerabilities"
          exit 1
