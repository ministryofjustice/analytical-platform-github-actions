---
on:
  workflow_call:
    inputs:
      chart-name:
        type: string
        required: true
      chart-path:
        type: string
        required: false
        default: chart
      is-monorepo:
        type: boolean
        required: false
        default: false
    secrets:
      release-failure-webhook-url:
        required: false

permissions: {}

jobs:
  chart-release:
    name: Chart Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Harden Runner
        if: github.event.repository.private == false
        id: harden_runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify Monorepo Tag Format
        env:
          REF_NAME: ${{ github.ref_name }}
          CHART_NAME: ${{ inputs.chart-name }}
        run: |
          if [[ "${REF_NAME}" != "${CHART_NAME}/"* ]]; then
            echo "ERROR: Monorepo tag '${REF_NAME}' is invalid."
            echo "Tags must be prefixed with the chart name (e.g., '${CHART_NAME}/<version>')."
            exit 1
          fi

      - name: Set Up Cosign
        id: setup_cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set Up Crane
        id: setup_crane
        uses: ministryofjustice/action-setup-crane@b8d5be6affce54f6ff5f54e90174508bf4522672 # v1.0.0

      - name: Set Up Helm
        id: setup_helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Log in to GitHub Container Registry
        id: login_ghcr
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Chart
        id: package_chart
        shell: bash
        env:
          CHART_PATH: ${{ inputs.chart-path }}
        run: |
          helm package "${CHART_PATH}" --destination .helm-deploy
          CHART_VERSION=$(grep -E '^version:' "${CHART_PATH}/Chart.yaml" | awk '{print $2}')
          echo "CHART_VERSION=${CHART_VERSION}" >> "${GITHUB_ENV}"

      - name: Push Chart
        id: push_chart
        shell: bash
        env:
          CHART_NAME: ${{ inputs.chart-name }}
        run: |
          helm push ".helm-deploy/${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/ministryofjustice/analytical-platform-charts

      - name: Get Release Digest
        id: get_release_digest
        shell: bash
        env:
          CHART_NAME: ${{ inputs.chart-name }}
          CHART_VERSION: ${{ env.CHART_VERSION }}
        run: |
          releaseDigest=$(crane digest "ghcr.io/ministryofjustice/analytical-platform-charts/${CHART_NAME}:${CHART_VERSION}")
          export releaseDigest

          echo "release-digest=${releaseDigest}" >>"${GITHUB_ENV}"

      - name: Cosign
        id: cosign
        shell: bash
        env:
          CHART_NAME: ${{ inputs.chart-name }}
          DIGEST: ${{ env.release-digest }}
        run: |
          cosign sign --yes "ghcr.io/ministryofjustice/analytical-platform-charts/${CHART_NAME}@${DIGEST}"

      - name: GitHub Attestation
        id: github_attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/ministryofjustice/analytical-platform-charts/${{ inputs.chart-name }}
          subject-digest: ${{ env.release-digest }}
          push-to-registry: true

      - name: Cosign Verification
        id: cosign_verification
        shell: bash
        env:
          CHART_NAME: ${{ inputs.chart-name }}
          DIGEST: ${{ env.release-digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="https://github\.com/ministryofjustice/analytical-platform-github-actions/\.github/workflows/reusable-chart-release\.yml.+" \
            "ghcr.io/ministryofjustice/analytical-platform-charts/${CHART_NAME}@${DIGEST}"

      - name: GitHub Attestation Verification
        id: github_attestation_verification
        shell: bash
        env:
          CHART_NAME: ${{ inputs.chart-name }}
          GH_TOKEN: ${{ github.token }}
          CHART_VERSION: ${{ env.CHART_VERSION }}
        run: |
          gh attestation verify \
            "oci://ghcr.io/ministryofjustice/analytical-platform-charts/${CHART_NAME}:${CHART_VERSION}" \
            --repo ${{ github.repository }} \
            --signer-workflow ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-chart-release.yml

      - name: Slack Release Alert
        if: failure()
        id: slack_release_alert
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.release-failure-webhook-url }}
          payload: |
            {
              "repository": "${{ github.repository }}",
              "run_id": "${{ github.run_id }}"
            }
